name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (syntax check)
        run: python -m py_compile src/*.py tests/*.py

      - name: Ingest data
        run: python -m src.ingest

      - name: Load raw layer
        run: python -m src.load_raw

      - name: dbt build (staging + marts + tests)
        run: dbt build --project-dir dbt --profiles-dir dbt

      - name: Export business metrics
        run: python -m src.export_metrics

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t olist-analytics:ci .
