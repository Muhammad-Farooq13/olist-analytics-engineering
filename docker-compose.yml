services:
  olist-dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: olist-analytics:latest
    container_name: olist-analytics-dashboard
    ports:
      - "8501:8501"
    environment:
      - CONFIG_PATH=configs/config.yaml
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
