version: 2

models:
  - name: stg_orders
    description: "One row per order with typed lifecycle timestamps."
    columns:
      - name: order_id
        description: "Primary key."
        tests:
          - unique
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'canceled', 'unavailable', 'invoiced', 'processing', 'created', 'approved']

  - name: stg_order_items
    description: "One row per line item within an order."
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: item_price
        tests:
          - not_null

  - name: stg_customers
    description: "One row per order-customer record."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - not_null

  - name: stg_products
    description: "One row per product with English category names."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: category_english
        tests:
          - not_null

  - name: stg_payments
    description: "One row per order, payments aggregated."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: total_payment_value
        tests:
          - not_null
